{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white text-center"><h3><i class="bi bi-person-plus"></i> Регистрация</h3></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><input type="text" name="username" class="form-control" placeholder="Придумайте логин" required autofocus></div>
                    <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Пароль" required></div>
                    <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
                </form>
                <p class="mt-3 text-center">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войдите</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
