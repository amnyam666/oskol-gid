{% extends "base.html" %}
{% block title %}Редактировать{% endblock %}
{% block content %}
<h2><i class="bi bi-pencil-square"></i> Редактирование: {{ place.name }}</h2>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3"><label>Название*</label><input type="text" name="name" class="form-control" value="{{ place.name }}" required></div>
            <div class="mb-3"><label>Описание</label><textarea name="description" rows="3" class="form-control">{{ place.description }}</textarea></div>
            <div class="mb-3"><label>Категория</label><select name="category" class="form-select"><option value="monument" {% if place.category=='monument' %}selected{% endif %}>Памятник</option><option value="park" {% if place.category=='park' %}selected{% endif %}>Парк</option><option value="museum" {% if place.category=='museum' %}selected{% endif %}>Музей</option><option value="cafe" {% if place.category=='cafe' %}selected{% endif %}>Кафе</option></select></div>
            <div class="mb-3"><label>Адрес</label><input type="text" name="address" class="form-control" value="{{ place.address }}"></div>
            <div class="mb-3"><label>URL фото</label><input type="url" name="photo_url" class="form-control" value="{{ place.photo_url }}"></div>
            <button type="submit" class="btn btn-primary">Сохранить изменения</button>
            <a href="{{ url_for('admin_panel') }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
