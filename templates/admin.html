{% extends "base.html" %}
{% block content %}
<h2>Админ-панель</h2>
<a href="{{ url_for('add_place') }}" class="btn btn-success mb-3">➕ Добавить место</a>
<table class="table table-bordered">
    <thead><tr><th>ID</th><th>Название</th><th>Действия</th></tr></thead>
    <tbody>
    {% for place in places %}
    <tr>
        <td>{{ place.id }}</td>
        <td>{{ place.name }}</td>
        <td>
            <a href="{{ url_for('edit_place', place_id=place.id) }}" class="btn btn-sm btn-primary">✏️</a>
            <a href="{{ url_for('delete_place', place_id=place.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">🗑️</a>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
